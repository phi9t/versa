name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev deps
        run: pip install -e ".[dev,api]"

      - name: Run unit tests
        run: pytest -q -m "not integration"

      - name: Build UI
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm ci and build ui
        if: matrix.python-version == '3.12'
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build distributions
        if: matrix.python-version == '3.12'
        run: python -m build

      - name: Upload build artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist-py312
          path: dist/
          retention-days: 7

  e2e-ui:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        run: pip install -e ".[dev,api]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI deps and build
        run: |
          cd ui
          npm ci
          npm run build

      - name: Install Playwright browser
        run: |
          cd ui
          npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        run: |
          cd ui
          npm run test:e2e
